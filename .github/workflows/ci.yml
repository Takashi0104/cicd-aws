name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-1

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: |
          pip install -r requirements.txt

      - name: pytest実行
        run: pytest

      - name: AWS認証
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-region: ap-northeast-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: ECRログイン
        run: |
          aws ecr get-login-password --region ap-northeast-1 \
          | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY_URI }}

      - name: Docker build
        run: docker build -t cicd-app .

      - name: Docker tag
        run: docker tag cicd-app:latest ${{ secrets.ECR_REPOSITORY_URI }}:latest

      - name: Docker push
        run: docker push ${{ secrets.ECR_REPOSITORY_URI }}:latest